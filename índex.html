
<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Câmbio Pro - Gestão de Tesouraria</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .hide-scroll::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-[#f8fafc]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        // Ícones SVG Simples para evitar dependências externas de pacotes
        const Icon = ({ name, size = 20, className = "" }) => {
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const App = () => {
            const [isSidebarOpen, setIsSidebarOpen] = useState(false);
            const [activeTab, setActiveTab] = useState('operacao');
            const [toasts, setToasts] = useState([]);
            const [suppliers, setSuppliers] = useState([
                { id: 1, name: 'FORNECEDOR MATRIZ', rate: 1.78 }
            ]);
            const [transactions, setTransactions] = useState([]);
            const [editingSupplier, setEditingSupplier] = useState(null);
            const [formData, setFormData] = useState({ supplierId: '', amountBrl: '', supplierRate: '', myRate: '' });

            useEffect(() => {
                lucide.createIcons();
            }, [activeTab, isSidebarOpen, suppliers, transactions]);

            const addToast = (message, type = 'success') => {
                const id = Date.now();
                setToasts(prev => [...prev, { id, message, type }]);
                setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 3000);
            };

            const totals = useMemo(() => {
                return transactions.reduce((acc, tx) => {
                    acc.brl += Number(tx.amountBrl) || 0;
                    acc.bob += Number(tx.amountBob) || 0;
                    acc.profit += Number(tx.profit) || 0;
                    return acc;
                }, { brl: 0, bob: 0, profit: 0 });
            }, [transactions]);

            const handleAddTransaction = (e) => {
                e.preventDefault();
                const supplier = suppliers.find(s => s.id === parseInt(formData.supplierId));
                if (!supplier || !formData.amountBrl || !formData.supplierRate || !formData.myRate) {
                    addToast('Preencha todos os campos!', 'error');
                    return;
                }
                const brlIn = parseFloat(formData.amountBrl);
                const sRate = parseFloat(formData.supplierRate);
                const mRate = parseFloat(formData.myRate);

                const bobTotal = brlIn * sRate;
                const brlEquivalent = bobTotal / mRate;
                const profitVal = brlEquivalent - brlIn;

                const newTx = {
                    id: Date.now(),
                    date: new Date().toLocaleDateString('pt-PT'),
                    time: new Date().toLocaleTimeString('pt-PT', { hour: '2-digit', minute: '2-digit' }),
                    supplierName: supplier.name,
                    amountBrl: brlIn,
                    supplierRate: sRate,
                    myRate: mRate,
                    amountBob: bobTotal,
                    profit: profitVal
                };

                setTransactions(prev => [newTx, ...prev]);
                setFormData(prev => ({ ...prev, amountBrl: '' }));
                addToast('Lançamento registado!');
                setActiveTab('relatorio');
            };

            return (
                <div className="flex h-screen overflow-hidden">
                    {/* Pop-ups */}
                    <div className="fixed top-4 right-4 z-[100] flex flex-col gap-2">
                        {toasts.map(t => (
                            <div key={t.id} className={`flex items-center gap-3 px-4 py-2 rounded-lg shadow-xl border ${t.type === 'error' ? 'bg-red-600 text-white' : 'bg-slate-900 text-white'}`}>
                                <span className="text-xs font-bold uppercase">{t.message}</span>
                            </div>
                        ))}
                    </div>

                    {/* Sidebar */}
                    <aside className={`${isSidebarOpen ? 'w-64' : 'w-16'} bg-[#0f172a] text-white transition-all duration-300 flex flex-col shadow-2xl`}>
                        <div className="h-14 flex items-center px-4 border-b border-slate-800">
                            <button onClick={() => setIsSidebarOpen(!isSidebarOpen)} className="p-1 hover:bg-slate-800 rounded">
                                <Icon name="menu" size={20} />
                            </button>
                        </div>
                        <nav className="flex-1 py-4 px-2 space-y-2">
                            <button onClick={() => setActiveTab('operacao')} className={`w-full flex items-center gap-3 p-2 rounded-lg ${activeTab === 'operacao' ? 'bg-blue-600 text-white' : 'text-slate-400'}`}>
                                <Icon name="calculator" size={20} />
                                {isSidebarOpen && <span className="text-[10px] font-bold uppercase tracking-widest">Lançar</span>}
                            </button>
                            <button onClick={() => setActiveTab('relatorio')} className={`w-full flex items-center gap-3 p-2 rounded-lg ${activeTab === 'relatorio' ? 'bg-blue-600 text-white' : 'text-slate-400'}`}>
                                <Icon name="file-text" size={20} />
                                {isSidebarOpen && <span className="text-[10px] font-bold uppercase tracking-widest">Relatório</span>}
                            </button>
                            <button onClick={() => setActiveTab('suppliers')} className={`w-full flex items-center gap-3 p-2 rounded-lg ${activeTab === 'suppliers' ? 'bg-blue-600 text-white' : 'text-slate-400'}`}>
                                <Icon name="users" size={20} />
                                {isSidebarOpen && <span className="text-[10px] font-bold uppercase tracking-widest">Parceiros</span>}
                            </button>
                        </nav>
                    </aside>

                    {/* Conteúdo */}
                    <div className="flex-1 flex flex-col overflow-hidden">
                        <header className="h-14 bg-white border-b border-slate-200 px-6 flex items-center justify-between">
                            <h2 className="text-[10px] font-black uppercase text-slate-400 tracking-[0.2em]">Câmbio Pro v1.0</h2>
                            <div className="flex gap-4">
                                <span className="text-[10px] font-black text-emerald-600 uppercase">Lucro: R$ {totals.profit.toFixed(2)}</span>
                                <span className="text-[10px] font-black text-slate-800 uppercase">Caixa: R$ {totals.brl.toFixed(2)}</span>
                            </div>
                        </header>

                        <div className="flex-1 overflow-y-auto p-6 bg-[#f1f5f9]/50">
                            {activeTab === 'operacao' && (
                                <div className="max-w-md mx-auto bg-white p-8 rounded-3xl shadow-sm border border-slate-200">
                                    <form onSubmit={handleAddTransaction} className="space-y-4">
                                        <div className="space-y-4">
                                            <div>
                                                <label className="text-[9px] font-black text-slate-400 uppercase tracking-widest block mb-1">Fornecedor</label>
                                                <select className="w-full h-10 px-3 bg-slate-50 border border-slate-200 rounded-lg text-xs font-bold" value={formData.supplierId} onChange={e => setFormData({...formData, supplierId: e.target.value})} required>
                                                    <option value="">Escolher...</option>
                                                    {suppliers.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
                                                </select>
                                            </div>
                                            <div>
                                                <label className="text-[9px] font-black text-indigo-500 uppercase tracking-widest block mb-1">Valor Recebido (R$)</label>
                                                <input type="number" step="0.01" className="w-full h-12 px-4 bg-indigo-50/20 border border-indigo-100 rounded-xl font-black text-xl" value={formData.amountBrl} onChange={e => setFormData({...formData, amountBrl: e.target.value})} required />
                                            </div>
                                            <div className="grid grid-cols-2 gap-3">
                                                <input type="number" step="0.001" className="w-full h-10 px-3 border rounded-lg text-xs font-bold" placeholder="Taxa F" value={formData.supplierRate} onChange={e => setFormData({...formData, supplierRate: e.target.value})} required />
                                                <input type="number" step="0.001" className="w-full h-10 px-3 border border-indigo-200 rounded-lg text-xs font-black text-indigo-600" placeholder="Taxa M" value={formData.myRate} onChange={e => setFormData({...formData, myRate: e.target.value})} required />
                                            </div>
                                        </div>
                                        <button className="w-full h-12 bg-slate-900 text-white rounded-xl font-black text-[10px] uppercase tracking-widest">Registar Lançamento</button>
                                    </form>
                                </div>
                            )}

                            {activeTab === 'relatorio' && (
                                <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                                    <table className="w-full text-left text-[11px]">
                                        <thead className="bg-[#0f172a] text-slate-500 font-bold uppercase">
                                            <tr>
                                                <th className="p-3">Hora</th>
                                                <th className="p-3">Parceiro</th>
                                                <th className="p-3 text-right">In (R$)</th>
                                                <th className="p-3 text-right text-blue-400 bg-slate-800/50">Out (Bs)</th>
                                                <th className="p-3 text-right text-emerald-400">Lucro (R$)</th>
                                                <th className="p-3"></th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-100">
                                            {transactions.map(tx => (
                                                <tr key={tx.id} className="hover:bg-slate-50">
                                                    <td className="p-3 text-slate-400">{tx.time}</td>
                                                    <td className="p-3 font-black text-slate-700 uppercase">{tx.supplierName}</td>
                                                    <td className="p-3 text-right font-black">R$ {tx.amountBrl.toFixed(2)}</td>
                                                    <td className="p-3 text-right font-black text-indigo-600">Bs {tx.amountBob.toFixed(2)}</td>
                                                    <td className="p-3 text-right font-black text-emerald-600">R$ {tx.profit.toFixed(2)}</td>
                                                    <td className="p-3 text-center">
                                                        <button onClick={() => setTransactions(t => t.filter(i => i.id !== tx.id))} className="text-slate-200 hover:text-red-500">
                                                            <Icon name="trash-2" size={14} />
                                                        </button>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                        <tfoot className="bg-slate-900 text-white font-black uppercase text-[9px]">
                                            <tr>
                                                <td colSpan="2" className="p-4">Totais</td>
                                                <td className="p-4 text-right font-bold">R$ {totals.brl.toFixed(2)}</td>
                                                <td className="p-4 text-right text-indigo-400">Bs {totals.bob.toFixed(2)}</td>
                                                <td className="p-4 text-right text-emerald-400 text-xs">R$ {totals.profit.toFixed(2)}</td>
                                                <td></td>
                                            </tr>
                                        </tfoot>
                                    </table>
                                </div>
                            )}

                            {activeTab === 'suppliers' && (
                                <div className="max-w-2xl mx-auto space-y-4">
                                    <div className="bg-white p-6 rounded-xl border border-slate-200">
                                        <form onSubmit={(e) => {
                                            e.preventDefault();
                                            const name = e.target.name.value;
                                            const rate = e.target.rate.value;
                                            setSuppliers([...suppliers, { id: Date.now(), name: name.toUpperCase(), rate: parseFloat(rate) }]);
                                            e.target.reset();
                                            addToast('Fornecedor adicionado');
                                        }} className="flex gap-2">
                                            <input name="name" className="flex-1 p-2 border rounded-lg text-xs" placeholder="NOME" required />
                                            <input name="rate" type="number" step="0.01" className="w-20 p-2 border rounded-lg text-xs" placeholder="TAXA" required />
                                            <button type="submit" className="bg-blue-600 text-white px-4 rounded-lg text-[10px] font-black uppercase">Add</button>
                                        </form>
                                    </div>
                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-2">
                                        {suppliers.map(s => (
                                            <div key={s.id} className="bg-white p-4 rounded-xl border border-slate-200 flex justify-between items-center group">
                                                <div>
                                                    <p className="text-[11px] font-black uppercase text-slate-800 leading-none mb-1">{s.name}</p>
                                                    <p className="text-[9px] font-bold text-blue-600 uppercase">Custo: {s.rate.toFixed(2)}</p>
                                                </div>
                                                <button onClick={() => setSuppliers(prev => prev.filter(i => i.id !== s.id))} className="text-slate-200 hover:text-red-500 opacity-0 group-hover:opacity-100">
                                                    <Icon name="trash-2" size={14} />
                                                </button>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
